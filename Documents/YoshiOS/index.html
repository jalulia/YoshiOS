<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Color hierarchy ───
const AMBER_HI  = "#ffd978";
const AMBER     = "#f0ad3b";
const AMBER_MID = "#c48a2a";
const AMBER_DIM = "#6B5510";
const BG = "#1C1A0E";
const BG_FILL = "#3a3328";
const PX = "'Geist Pixel', monospace";
const MONO = "'Geist Mono', monospace";
const W = 832, H = 300;
const LEFT_PANEL_W = 280, GROUND_Y = 197, AUDIO_Y = 222;
const REAR_VAN_CX = 405, SIDE_VAN_CX = 660;

// ═══ TEXTURAL DITHER — BG_FILL color, reads only against bright elements ═══
const BAYER8 = [
  [0,48,12,60,3,51,15,63],[32,16,44,28,35,19,47,31],
  [8,56,4,52,11,59,7,55],[40,24,36,20,43,27,39,23],
  [2,50,14,62,1,49,13,61],[34,18,46,30,33,17,45,29],
  [10,58,6,54,9,57,5,53],[42,26,38,22,41,25,37,21],
];
const DitherWipe = ({ active, onDone }) => {
  const canvasRef = useRef(null), rafRef = useRef(null), startRef = useRef(null);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cw = canvas.width, ch = canvas.height;
    const cellSize = 2;
    const cols = Math.ceil(cw/cellSize), rows = Math.ceil(ch/cellSize);
    const duration = 280;
    const bandHeight = 30;
    startRef.current = performance.now();
    const animate = (now) => {
      const t = Math.min((now - startRef.current) / duration, 1);
      ctx.clearRect(0, 0, cw, ch);
      const bandCenter = t * (ch + bandHeight) - bandHeight/2;
      const bandTop = bandCenter - bandHeight/2;
      const bandBot = bandCenter + bandHeight/2;
      // BG_FILL color — only visible where it darkens bright amber elements
      ctx.fillStyle = '#3a3328';
      for (let cy = Math.max(0, Math.floor(bandTop/cellSize)); cy < Math.min(rows, Math.ceil(bandBot/cellSize)); cy++) {
        const pixelY = cy * cellSize;
        const dist = Math.abs(pixelY - bandCenter) / (bandHeight/2);
        const edgeThreshold = dist * 64;
        for (let cx = 0; cx < cols; cx++) {
          if (BAYER8[cy%8][cx%8] >= edgeThreshold) {
            ctx.fillRect(cx*cellSize, pixelY, cellSize, cellSize);
          }
        }
      }
      if (t < 1) rafRef.current = requestAnimationFrame(animate);
      else { ctx.clearRect(0, 0, cw, ch); if (onDone) onDone(); }
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [active, onDone]);
  if (!active) return null;
  return <canvas ref={canvasRef} width={W*2} height={H*2}
    style={{position:'absolute',inset:0,width:'100%',height:'100%',zIndex:50,pointerEvents:'none'}} />;
};

let liveData = {}, mqttConnected = false;
if (window.yoshios) {
  window.yoshios.onMqttStatus((s) => { mqttConnected = s === 'connected'; });
  window.yoshios.onMqttData(({ topic, value }) => {
    if (topic.includes('/Soc')) liveData.batPct = Math.round(value);
    if (topic.includes('/Yield/Power')) { liveData.solW = Math.round(value); liveData.solPct = Math.min(100, Math.round((value/400)*100)); }
    if (topic.includes('/Dc/0/Voltage')) liveData.voltage = value;
    if (topic.includes('/Dc/0/Power')) liveData.loadW = Math.round(value);
  });
}
const useSimData = (sub) => {
  const [d, setD] = useState({
    time:"10:37", date:"August 23, 2025", batPct:75, solPct:86, chAh:23, totAh:34,
    solW:240, loadW:-144, oilPct:48, oilL:3.2, engF:102, hum:54,
    roll:6.9, pitch:-4.2, hdg:"N", hdgDeg:4, ambF:72,
    artist:"Spiral", track:"The Vernon Spring", src:"Spotify",
    pos:32, dur:165, vol:28, playing:true,
  });
  useEffect(() => {
    const iv = setInterval(() => setD(p => {
      const now = new Date();
      const base = { ...p,
        time: now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false}),
        date: now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),
        pos: p.playing && sub.spotify ? (p.pos+1) % p.dur : p.pos,
        roll: sub.sensors ? +(Math.sin(Date.now()/4000)*8).toFixed(1) : 0,
        pitch: sub.sensors ? +(Math.sin(Date.now()/5000+1)*5).toFixed(1) : 0,
        hdgDeg: sub.sensors ? (Date.now()/80)%360 : 0,
        hdg: sub.sensors ? ["N","NE","E","SE","S","SW","W","NW"][Math.floor(((Date.now()/80)%360)/45)] : "--",
      };
      if (mqttConnected && sub.victron) {
        base.batPct=liveData.batPct??p.batPct; base.solPct=liveData.solPct??p.solPct;
        base.solW=liveData.solW??p.solW; base.loadW=liveData.loadW!=null?-Math.abs(liveData.loadW):p.loadW;
      } else if (sub.victron) {
        base.batPct=75+Math.round(Math.sin(Date.now()/10000)*3); base.solPct=86+Math.round(Math.sin(Date.now()/12000)*4);
        base.solW=240+Math.round(Math.sin(Date.now()/8000)*20); base.loadW=-144+Math.round(Math.sin(Date.now()/9000)*10);
      } else { base.batPct=null;base.solPct=null;base.solW=null;base.loadW=null; }
      return base;
    }), 1000);
    return () => clearInterval(iv);
  }, [sub.spotify, sub.victron, sub.sensors]);
  return d;
};
const useWaveform = (on) => {
  const [pts, setPts] = useState([]);
  useEffect(() => {
    if (!on) { setPts([]); return; }
    const iv = setInterval(() => {
      const a=[],t=Date.now()/200;
      for(let i=0;i<80;i++) a.push({x:i, y:Math.sin((i+t)*0.3)*8+Math.sin((i+t)*0.7)*4+Math.sin((i+t)*1.3)*2+(Math.random()-0.5)*3});
      setPts(a);
    }, 80);
    return () => clearInterval(iv);
  }, [on]);
  return pts;
};
const useFeedback = () => {
  const [flash,setFlash]=useState(null);const [volP,setVolP]=useState(false);const [srcF,setSrcF]=useState(null);
  const trigger = useCallback((t,v) => {
    if(t==="screen"){setFlash(v);setTimeout(()=>setFlash(null),500);}
    if(t==="volume"){setVolP(true);setTimeout(()=>setVolP(false),400);}
    if(t==="source"){setSrcF(v);setTimeout(()=>setSrcF(null),600);}
  }, []);
  return { flash, volP, srcF, trigger };
};
const fmtT = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

const Num = ({x,y,val,maxCh=5,size=10,color=AMBER_HI,anchor="start",weight=400,font=MONO}) => {
  const chW=size*0.6, w=maxCh*chW;
  const ax=anchor==="end"?x:anchor==="middle"?x-w/2:x;
  return <g><rect x={ax} y={y-size+1} width={w} height={size+2} fill="none" stroke="none" />
    <text x={x} y={y} fill={color} fontSize={size} fontFamily={font} fontWeight={weight}
      textAnchor={anchor} letterSpacing="0.03em" style={{fontVariantNumeric:"tabular-nums"}}>{val}</text></g>;
};

// ═══ Yoshi Egg — very faint pixel art, slow gentle pulse ═══
const YoshiEgg = ({x, y}) => {
  // Classic Yoshi egg: oval with spots, rendered in minimal pixel blocks
  // Each "pixel" is 2x2 at this scale
  const p = 2; // pixel size
  const c = AMBER_DIM; // very faint
  // Egg outline (oval ~12x16 pixels)
  const outline = [
    [4,0],[5,0],[6,0],[7,0],
    [3,1],[8,1],
    [2,2],[9,2],
    [1,3],[10,3],
    [1,4],[10,4],
    [0,5],[11,5],
    [0,6],[11,6],
    [0,7],[11,7],
    [0,8],[11,8],
    [1,9],[10,9],
    [1,10],[10,10],
    [2,11],[9,11],
    [3,12],[8,12],
    [4,13],[5,13],[6,13],[7,13],
  ];
  // Spots (the classic green dots — here just slightly brighter)
  const spots = [
    [4,4],[5,4],[4,5],[5,5], // top spot
    [7,7],[8,7],[7,8],[8,8], // middle spot
    [3,9],[4,9],[3,10],[4,10], // bottom spot
  ];
  return <g transform={`translate(${x},${y})`} opacity={0.15}>
    <animateTransform attributeName="transform" type="translate" values={`${x},${y};${x},${y-1};${x},${y}`} dur="4s" repeatCount="indefinite" additive="replace" />
    <animate attributeName="opacity" values="0.12;0.2;0.12" dur="6s" repeatCount="indefinite" />
    {outline.map((px,i) => <rect key={`o${i}`} x={px[0]*p} y={px[1]*p} width={p} height={p} fill={c} />)}
    {spots.map((px,i) => <rect key={`s${i}`} x={px[0]*p} y={px[1]*p} width={p} height={p} fill={AMBER_MID} />)}
  </g>;
};

const BarGauge = ({val,x,y,w=20,h=90,off}) => {
  const segs=10,filled=val!=null?Math.round((val/100)*segs):0,segH=h/segs;
  return <g>{Array.from({length:segs},(_,i)=>{const sy=y+(segs-1-i)*segH,f=!off&&i<filled;
    return <rect key={i} x={x} y={sy} width={w} height={segH-2} fill={f?AMBER:"none"}
      stroke={off?AMBER_DIM:(f?AMBER:AMBER_DIM)} strokeWidth={0.5} strokeDasharray={off?"2 2":"none"} />;})}</g>;
};

const SpeakerIcon = ({x,y,vol}) => <g>

  {vol>10&&<path d={`M${x+10} ${y+2} Q${x+13} ${y+5} ${x+10} ${y+8}`} fill="none" stroke={AMBER} strokeWidth={0.5} />}
  {vol>40&&<path d={`M${x+12} ${y} Q${x+16} ${y+5} ${x+12} ${y+10}`} fill="none" stroke={AMBER} strokeWidth={0.5} />}</g>;
const Waveform = ({pts,x,y,w,h}) => {
  if(!pts.length) return <line x1={x} y1={y+h/2} x2={x+w} y2={y+h/2} stroke={AMBER_DIM} strokeWidth={0.3} />;
  const sx=w/80;
  return <path d={pts.map((p,i)=>`${i===0?"M":"L"} ${x+p.x*sx} ${y+h/2+p.y*(h/30)}`).join(" ")} fill="none" stroke={AMBER} strokeWidth={1} />;
};
const AlertBar = ({sub}) => {
  const d=[];if(!sub.victron)d.push("PWR");if(!sub.gps)d.push("GPS");if(!sub.sensors)d.push("SENS");if(!sub.spotify)d.push("AUD");
  if(d.length<2)return null;
  return <g><rect x={250} y={2} width={332} height={12} fill={BG} stroke={AMBER} strokeWidth={0.4} />
    <text x={416} y={10} fill={AMBER_HI} fontSize="7" fontFamily={PX} textAnchor="middle" letterSpacing="0.15em">⚠ {d.join(" + ")} OFFLINE</text></g>;
};
const BootScreen = ({pcState}) => {
  const letters = ["Y","O","S","H","I","_","O","S"];
  const boxW=28,boxH=28,gap=4;const totalW=letters.length*(boxW+gap)-gap;
  const startX=(W-totalW)/2, centerY=118;
  return <g>
    <line x1={startX-20} y1={centerY-boxH/2-14} x2={startX+totalW+20} y2={centerY-boxH/2-14} stroke={AMBER_DIM} strokeWidth={0.3} />
    {letters.map((ch,i) => {const x=startX+i*(boxW+gap);const isU=ch==="_";
      return <g key={i}><rect x={x} y={centerY-boxH/2} width={boxW} height={boxH}
        fill="none" stroke={isU?AMBER_DIM:AMBER} strokeWidth={isU?0.3:0.5} />
        <text x={x+boxW/2} y={centerY+7} fill={isU?AMBER_DIM:AMBER_HI}
          fontSize="18" fontFamily={PX} textAnchor="middle">{ch}</text></g>;})}
    <line x1={startX-20} y1={centerY+boxH/2+10} x2={startX+totalW+20} y2={centerY+boxH/2+10} stroke={AMBER_DIM} strokeWidth={0.3} />
    <text x={startX-10} y={centerY+boxH/2+26} fill={AMBER_MID} fontSize="7.5" fontFamily={PX} letterSpacing="0.16em">
      {pcState==="booting"?"NET: LOCAL    MEM: 640K OK    STATUS: BOOTING":"NET: —    MEM: —    STATUS: WAITING"}</text>
    {pcState==="booting"&&<g><rect x={W/2-50} y={centerY+boxH/2+38} width={100} height={2} fill="none" stroke={AMBER_DIM} strokeWidth={0.3} />
      <rect x={W/2-50} y={centerY+boxH/2+38} width={50} height={2} fill={AMBER}>
        <animate attributeName="width" values="10;90;10" dur="2.5s" repeatCount="indefinite" /></rect></g>}
  </g>;
};

    <text x={15} y={20} fill={AMBER_HI} fontSize="14" fontFamily={PX} letterSpacing="0.15em">YoshiOS</text>
    <text x={W-15} y={20} fill={AMBER_DIM} fontSize="9" fontFamily={PX} textAnchor="end" letterSpacing="0.1em">{d.time}</text>
    <line x1={10} y1={28} x2={W-10} y2={28} stroke={AMBER_DIM} strokeWidth={0.2} />
    {fb.srcF&&<g><rect x={W/2-55} y={36} width={110} height={20} fill={AMBER_HI} rx={1} />
      <text x={W/2} y={50} fill={BG} fontSize="10" fontFamily={PX} textAnchor="middle" letterSpacing="0.1em">{fb.srcF}</text></g>}
    <text x={30} y={46} fill={AMBER_DIM} fontSize="6.5" fontFamily={PX} letterSpacing="0.18em">AUD_SPECTRUM</text>
    <Waveform pts={aOff?[]:wf} x={30} y={52} w={460} h={70} />
    {aOff&&<text x={260} y={90} fill={AMBER_DIM} fontSize="9" fontFamily={PX} textAnchor="middle" letterSpacing="0.12em">NO AUDIO</text>}
    <text x={520} y={46} fill={AMBER_DIM} fontSize="6.5" fontFamily={PX} letterSpacing="0.18em">NOW_PLAYING</text>
    <text x={520} y={62} fill={aOff?AMBER_DIM:AMBER_HI} fontSize="13" fontFamily={PX} letterSpacing="0.08em">{aOff?"—":d.artist.toUpperCase()}</text>
    <text x={520} y={80} fill={aOff?AMBER_DIM:AMBER} fontSize="11" fontFamily={PX} letterSpacing="0.06em">{aOff?"—":d.track.toUpperCase()}</text>
    <text x={520} y={100} fill={AMBER_DIM} fontSize="6" fontFamily={PX} letterSpacing="0.18em">SOURCE</text>
    <text x={520} y={114} fill={aOff?AMBER_DIM:AMBER} fontSize="9" fontFamily={PX} letterSpacing="0.1em">{aOff?"OFFLINE":d.src.toUpperCase()}</text>
    {!aOff&&<g transform="translate(520,122)">{d.playing?<g><rect x={0} y={0} width={3.5} height={9} fill={AMBER_HI} /><rect x={6} y={0} width={3.5} height={9} fill={AMBER_HI} />
      <text x={16} y={7} fill={AMBER_MID} fontSize="6" fontFamily={PX} letterSpacing="0.15em">PLAYING</text></g>:
      <g><polygon points="0,0 8,4.5 0,9" fill={AMBER_HI} /><text x={14} y={7} fill={AMBER_MID} fontSize="6" fontFamily={PX} letterSpacing="0.15em">PAUSED</text></g>}</g>}
    <rect x={30} y={168} width={W-60} height={4} fill="none" stroke={AMBER_DIM} strokeWidth={0.3} />
    {!aOff&&<rect x={30} y={168} width={(d.pos/d.dur)*(W-60)} height={4} fill={AMBER} />}
    <text x={30} y={184} fill={aOff?AMBER_DIM:AMBER_MID} fontSize="7" fontFamily={MONO} fontWeight={300}>{aOff?"—:—":fmtT(d.pos)}</text>
    <text x={W-30} y={184} fill={aOff?AMBER_DIM:AMBER_MID} fontSize="7" fontFamily={MONO} fontWeight={300} textAnchor="end">{aOff?"—:—":fmtT(d.dur)}</text>
    <g transform="translate(30,198)"><SpeakerIcon x={0} y={0} vol={d.vol} />
      <text x={20} y={8} fill={AMBER_HI} fontSize={fb.volP?"12":"9"} fontFamily={PX} style={{transition:"font-size 0.15s ease-out"}}>{d.vol}</text>
      <rect x={50} y={2} width={140} height={3} fill="none" stroke={AMBER_DIM} strokeWidth={0.3} />
      <rect x={50} y={2} width={(d.vol/100)*140} height={3} fill={AMBER} /></g>
    <text x={30} y={228} fill={AMBER_DIM} fontSize="6" fontFamily={PX} letterSpacing="0.15em">AUD_SOURCE</text>
    <g transform="translate(30,234)">{sources.map((s,i)=>{const act=d.src===s;return <g key={s} transform={`translate(${i*78},0)`}>
      <rect x={0} y={0} width={72} height={15} fill={act?AMBER:"none"} stroke={act?AMBER:AMBER_DIM} strokeWidth={0.4} rx={1} />
      <text x={36} y={10.5} fill={act?BG:AMBER_MID} fontSize="6.5" fontFamily={PX} textAnchor="middle" letterSpacing="0.1em">{s.toUpperCase()}</text></g>;})}</g>
  </g>;
};

function YoshiOS() {
  const [scr,setScr]=useState("boot");const [pendingScr,setPendingScr]=useState(null);
  const [wiping,setWiping]=useState(false);const [pc,setPc]=useState("off");
  const [sub,setSub]=useState({victron:true,gps:true,sensors:true,spotify:true});
  const fb=useFeedback();const d=useSimData(sub);const wf=useWaveform(d.playing&&sub.spotify);
  useEffect(()=>{const t1=setTimeout(()=>setPc("booting"),1500);
    const t2=setTimeout(()=>{setPc("running");setScr("dashboard");},4000);
    return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  const onWipeDone=useCallback(()=>{if(pendingScr){setScr(pendingScr);setPendingScr(null);}setWiping(false);},[pendingScr]);
  const sw=useCallback(s=>{if(pc!=="running"||s===scr||wiping)return;
    fb.trigger("screen",{dashboard:"HOME",map:"NAV",music:"MUSIC"}[s]);setPendingScr(s);setWiping(true);},[pc,scr,wiping,fb]);
  useEffect(()=>{const h=e=>{
    if(e.key==="1")sw("dashboard");if(e.key==="2")sw("map");if(e.key==="3")sw("music");
    if(e.key==="v")setSub(s=>({...s,victron:!s.victron}));if(e.key==="g")setSub(s=>({...s,gps:!s.gps}));
    if(e.key==="s")setSub(s=>({...s,sensors:!s.sensors}));if(e.key==="a")setSub(s=>({...s,spotify:!s.spotify}));
    if(e.key==="w")fb.trigger("volume");if(e.key==="q")fb.trigger("source","AUX");
  };window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[sw,fb]);
  const [dims,setDims]=useState({w:window.innerWidth,h:window.innerHeight});
  useEffect(()=>{const r=()=>setDims({w:window.innerWidth,h:window.innerHeight});
    window.addEventListener("resize",r);return()=>window.removeEventListener("resize",r);},[]);
  const scale=Math.min(dims.w/W,dims.h/H),svgW=W*scale,svgH=H*scale;
  return (
    <div style={{background:"#0A0A06",width:"100vw",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none",overflow:"hidden"}}>
      <div style={{position:"relative",overflow:"hidden",width:svgW,height:svgH}}>
        <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:10,
          background:"repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px)"}} />
        <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:11,
          background:"radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.35) 100%)"}} />
        <DitherWipe active={wiping} onDone={onWipeDone} />
        <svg width={svgW} height={svgH} viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
          <rect width={W} height={H} fill={BG} />
          {scr==="boot"&&<BootScreen pcState={pc} />}
          {scr==="dashboard"&&<Dashboard d={d} wf={wf} sub={sub} fb={fb} />}
          {scr==="map"&&<MapScreen d={d} sub={sub} />}
          {scr==="music"&&<MusicScreen d={d} wf={wf} sub={sub} fb={fb} />}
          {fb.flash&&<g><rect x={W/2-36} y={H/2-11} width={72} height={22} fill={BG} stroke={AMBER} strokeWidth={0.5} />
            <text x={W/2} y={H/2+4} fill={AMBER_HI} fontSize="11" fontFamily={PX} textAnchor="middle" letterSpacing="0.12em">{fb.flash}</text></g>}
        </svg></div></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<YoshiOS />);
</script></body></html>
