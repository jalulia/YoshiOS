# ============================================================================
# YoshiOS Project Manifest
# 1983 VW Vanagon Westfalia — CRT Vehicle Computer
# Last updated: 2026-02-28 (Session 5 — Victron hardware identified)
# ============================================================================

project:
  name: YoshiOS
  vehicle: 1983 VW Vanagon Westfalia
  codename: Yoshi
  status: prototyping


# ============================================================================
# DISPLAY HARDWARE
# ============================================================================

display:
  crt:
    source: 1986 Magnavox Videowriter 350
    type: 10" amber CRT
    phosphor: P3 (amber)
    resolution:
      width: 640
      height: 200
    color_depth: 1-bit
    refresh_rate: 60
    drive_method: direct         # RP2040 direct-drive (Route C)

  dev_display:
    board: PHA090-C16-V02
    panel: 9" IPS, 1024x600
    input: HDMI (confirm mini vs micro connector)
    features: [onboard speakers x2, touch connector, physical buttons]


# ============================================================================
# COMPOSITOR PC — Kingdel Fanless Industrial Mini PC
# ============================================================================

compositor:
  platform: windows
  hardware:
    brand: Kingdel
    model: HCTK090V.CA
    form_factor: fanless industrial (finned aluminum heatsink)
    cpu: TBD                     # check BIOS
    ram: TBD
    storage: TBD
    power: DC-12V                # direct 12V — ideal for vehicle

    ports:
      rear:
        audio: [MIC 3.5mm, SPK 3.5mm]
        usb: "4x USB 3.0 (two stacked pairs)"
        ethernet: [Lan1 RJ45, Lan2 RJ45]
        video: [VGA DB15, HDMI full-size]
        power: DC-12V barrel jack
        wireless: "2x SMA (TP-Link WiFi adapter installed)"
        serial: [COM1 DB9, COM2 DB9, COM3 DB9, COM4 DB9]

    port_allocation:
      # Primary connections
      usb_1: RP2040 (CRT frame streaming)
      usb_2: Teensy 4.1 (USB-HID input)
      usb_3: "USB Bluetooth 5.0 adapter (for WT901BLECL IMU)"
      usb_4: spare
      lan1: "Cerbo GX (direct Ethernet — MQTT data feed)"
      lan2: "Internet / WiFi bridge (or leave unused)"
      hdmi: dev_display during development
      dc_12v: vehicle 12V (needs regulation)
      # COM ports — available but NOT needed for Victron now
      # (Cerbo GX handles all Victron data via MQTT over Ethernet)
      com1: spare / GPS NMEA (if RS232 GPS receiver)
      com2: spare / debug
      com3: spare
      com4: spare

  architecture:
    backend: node_js
    frontend: browser            # MapLibre + UI compositing
    rendering:
      target: 640x200 @ 1-bit
      dither_method: TBD


# ============================================================================
# VICTRON ENERGY SYSTEM
# ============================================================================
# ARCHITECTURE CHANGE (Session 5):
#   The Cerbo GX eliminates the need for COM-port VE.Direct wiring,
#   ESP32 BLE bridges, or Bluetooth encryption keys. The Cerbo already
#   aggregates all Victron device data and exposes it over the network
#   via MQTT. The Kingdel connects to the Cerbo via Ethernet and
#   subscribes to MQTT topics. Dead simple.
# ============================================================================

victron:
  integration_method: mqtt_via_cerbo_gx
  transport: "Ethernet (Lan1 on Kingdel → Cerbo GX Ethernet port)"
  protocol: MQTT
  notes: |
    Cerbo GX runs Venus OS with built-in MQTT broker.
    Enable MQTT in Cerbo settings (Settings → Services → MQTT).
    Kingdel subscribes to topics for real-time data from all devices.
    No VE.Direct wiring, no BLE keys, no ESP32 needed for Victron.
    
    MQTT topic pattern: N/<portal_id>/<device_type>/<instance>/<path>
    Example topics:
      N/<id>/battery/0/Soc                    → state of charge %
      N/<id>/battery/0/Dc/0/Voltage           → battery voltage
      N/<id>/battery/0/Dc/0/Current           → battery current (A)
      N/<id>/battery/0/Dc/0/Power             → battery power (W)
      N/<id>/solarcharger/0/Yield/Power       → current PV power (W)
      N/<id>/solarcharger/0/Yield/User        → yield today (kWh)
      N/<id>/solarcharger/0/Pv/V              → PV voltage
      N/<id>/vebus/0/Ac/Out/L1/P              → inverter AC output (W)
      N/<id>/system/0/Dc/Battery/Soc          → system SOC
      N/<id>/system/0/Dc/Battery/TimeToGo     → time to go (seconds)
    
    To receive data, publish keepalive to: R/<portal_id>/keepalive
    (empty payload, every 30 seconds)

  cerbo_gx:
    product: Victron Cerbo GX
    role: System monitoring hub / MQTT broker
    os: Venus OS (Linux)
    connections:
      ethernet: "Direct to Kingdel Lan1 (or via small switch)"
      ve_direct: "Connected to SmartShunt + SmartSolar MPPT"
      ve_can: "May connect to Phoenix inverter (check)"
      bluetooth: built-in
      wifi: built-in
    features:
      - "Aggregates all Victron device data"
      - "Built-in MQTT broker (FlashMQ)"
      - "D-Bus API for advanced integration"
      - "Local web interface (VRM dashboard)"
      - "VE.Direct ports (at least 2)"
      - "USB ports for additional VE.Direct adapters"
      - "WiFi access point mode"
      - "Remote monitoring via Victron VRM portal"
    notes: |
      The Cerbo GX is the single integration point for ALL Victron data.
      It replaces: COM port wiring, ESP32 BLE bridge, BLE encryption keys,
      VE.Direct-to-USB cables, and individual device polling.

  devices:
    battery_monitor:
      product: Victron SmartShunt
      model: TBD                 # check for exact model number
      connection_to_cerbo: VE.Direct
      has_bluetooth: true
      data_available:
        - battery voltage
        - battery current
        - state of charge (SOC)
        - consumed energy (CE)
        - time to go (TTG)
        - instantaneous power

    solar_charger:
      product: Victron SmartSolar MPPT 100|30
      model: "SmartSolar MPPT 100/30"
      connection_to_cerbo: VE.Direct
      has_bluetooth: true
      specs:
        max_pv_voltage: 100V
        max_charge_current: 30A
      data_available:
        - PV voltage
        - PV current
        - PV power
        - charge state (bulk/absorption/float)
        - yield today
        - yield total
        - battery voltage (charger side)

    inverter:
      product: Victron Phoenix Inverter
      model: "Phoenix 12|1200"
      type: pure sinewave inverter
      specs:
        input: 12V DC
        output: "120V AC (North America)"
        power: 1200VA
      connection_to_cerbo: TBD   # check if VE.Direct or VE.Can
      has_bluetooth: TBD         # older Phoenix models may not have BT
      data_available:
        - AC output voltage
        - AC output current
        - AC output power
        - inverter state (on/off/eco)
        - alarms

    dc_dc_charger:
      product: Victron Orion-Tr Smart
      model: "Orion-Tr Smart 12|12-30"
      type: non-isolated DC-DC charger
      specs:
        input: 12V (from alternator/starter battery)
        output: 12V (to house battery)
        current: 30A
      connection_to_cerbo: "Bluetooth only (no VE.Direct port)"
      has_bluetooth: true
      notes: |
        The Orion-Tr Smart does NOT have a VE.Direct port.
        It connects to the Cerbo GX via Bluetooth (VE.Smart Networking).
        Data may still appear in MQTT if Cerbo picks it up via BT.
        If not, this is the one device where BLE Instant Readout
        from the Kingdel (or an ESP32) might still be useful.
      data_available:
        - input voltage (starter battery)
        - output voltage (house battery)
        - output current
        - charger state

    shore_charger:
      product: Victron Blue Smart Charger
      model: TBD                 # partially obscured in photo
      type: AC shore power charger
      connection_to_cerbo: TBD   # check — may be Bluetooth only
      has_bluetooth: true
      notes: "Charges house battery from shore power (campground hookup)"

    battery:
      type: lithium
      count: "1 installed, 1 more coming"
      model: TBD                 # check label
      notes: "Red busbar/terminal block visible above battery"

    fuse_block:
      type: "blade fuse block (visible near MPPT)"
      notes: "Standard automotive fuse distribution"


# ============================================================================
# MICROCONTROLLERS
# ============================================================================

mcu:
  rp2040:
    role: CRT direct-drive + USB frame receiver
    board: TBD
    firmware: TBD
    connection: USB to compositor PC
    payload: 1-bit bitmap        # 640x200 = 16,000 bytes/frame

  esp32:
    # STATUS: May no longer be needed at all.
    # - Victron data: handled by Cerbo GX over MQTT
    # - IMU: WT901BLECL talks directly to PC via Bluetooth
    # - Temp/humidity: only remaining use case
    #
    # KEEP ON HAND for:
    # - Orion-Tr Smart (if Cerbo can't see it via BT)
    # - Ambient temp/humidity sensor (BME280 on I2C)
    # - Future expansion
    role: TBD — likely unnecessary
    status: on_hold

  teensy:
    role: USB-HID input controller
    board: Teensy 4.1
    connection: USB-HID to compositor PC


# ============================================================================
# SENSORS
# ============================================================================

sensors:
  imu:
    product: WitMotion WT901BLECL
    type: 9-axis IMU (accel + gyro + magnetometer)
    interface: Bluetooth 5.0 BLE
    connection: direct to compositor PC
    no_mcu_needed: true
    notes: |
      Kingdel needs USB Bluetooth adapter (TP-Link is WiFi only).
      Mount orientation matters for pitch/roll.
      Magnetic heading needs declination offset.

  temperature:
    type: TBD                    # BME280 or rely on Cerbo's battery temp?
  humidity:
    type: TBD


# ============================================================================
# AUDIO / GPS / NAVIGATION
# ============================================================================

audio:
  amplifier:
    model: Kicker KEY 200.4
    channels: 4
  source: Spotify Web API

gps:
  receiver:
    model: TBD
    interface: TBD               # COM1 (RS232) or USB
    protocol: NMEA 0183

map:
  renderer: MapLibre GL JS
  style:
    foreground: "#D4A017"
    background: "#000000"


# ============================================================================
# UI DESIGN TOKENS
# ============================================================================

design:
  font:
    family: Bitcount Grid Single
    source: https://fonts.google.com/specimen/Bitcount+Grid+Single
    weights: [400, 500, 700]
  colors:
    amber: "#D4A017"
    background: "#000000"
  strokes:
    van_body: 1.3
    van_structural: 2.0
    compass: 1.3
  prototype:
    current_version: v4
    file: yoshios-prototype-v4.jsx
    ia_document: yoshios-ia-v3.md


# ============================================================================
# POWER
# ============================================================================

power:
  vehicle_system: 12V nominal (11.5–14.8V actual)
  kingdel_input: DC-12V
  notes: |
    Need DC-DC converter or automotive PC PSU for clean 12V.
    Cerbo GX battery voltage data could trigger graceful shutdown.


# ============================================================================
# NETWORK TOPOLOGY
# ============================================================================

network:
  description: |
    Simple point-to-point Ethernet between Kingdel and Cerbo GX.
    Could use a small switch if internet access is also needed on Lan1.
    Cerbo can also serve as WiFi AP for the Kingdel if preferred.
  
  topology:
    option_a: "Kingdel Lan1 ←→ Cerbo GX Ethernet (direct crossover or auto-MDX)"
    option_b: "Both on small 5-port switch + internet uplink"
    option_c: "Kingdel connects to Cerbo's WiFi AP (no cable needed)"
  
  mqtt:
    broker: "Cerbo GX (built-in FlashMQ)"
    port: 1883
    keepalive_topic: "R/<portal_id>/keepalive"
    keepalive_interval: 30       # seconds
    data_topics: "N/<portal_id>/<service>/<instance>/<path>"


# ============================================================================
# OPEN QUESTIONS
# ============================================================================

open_questions:
  - id: Q1
    priority: high
    question: "Enable MQTT on the Cerbo GX"
    action: "Cerbo GX → Settings → Services → MQTT on LAN → enable.
             Note the portal ID shown in Settings → VRM online portal."

  - id: Q2
    priority: high
    question: "How does the Phoenix inverter connect to the Cerbo?"
    action: "Check if Phoenix 12|1200 has VE.Direct or if it needs
             a VE.Direct-to-USB adapter plugged into the Cerbo."

  - id: Q3
    priority: high
    question: "Does the Cerbo see the Orion-Tr Smart via Bluetooth?"
    action: "Check Cerbo's device list. Orion-Tr Smart has no VE.Direct,
             only Bluetooth. Cerbo may pick it up via VE.Smart Networking."

  - id: Q4
    priority: medium
    question: "Blue Smart Charger model and Cerbo connection?"
    action: "Check if shore charger has VE.Direct or is BT-only."

  - id: Q5
    priority: medium
    question: "Boot the Kingdel — confirm CPU, RAM, OS"
    action: "Check BIOS or System Info"

  - id: Q6
    priority: medium
    question: "Battery specs (model, Ah, chemistry)"
    action: "Check battery label. Second battery coming."

  - id: Q7
    priority: medium
    question: "What dashboard data is most important?"
    action: "Now that we know what's available via MQTT, decide
             priority: SOC, voltage, solar power, inverter load,
             Orion charging status, time-to-go, etc."

  - id: Q8
    priority: low
    question: "GPS receiver choice"
    action: "USB puck or RS232 on COM1"

  - id: Q9
    priority: low
    question: "12V power regulation for Kingdel"
    action: "Research automotive PC power supplies"
